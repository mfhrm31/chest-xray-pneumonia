# Chest X-Ray Pneumonia — ResNet50 Configuration

model:
  backbone: "resnet50"
  pretrained: true
  num_classes: 2
  dropout: 0.3
  freeze_backbone_epochs: 5

data:
  data_dir: "data/chest_xray/"
  image_size: 224
  batch_size: 32
  num_workers: 4

augmentation:
  random_horizontal_flip: false  # Asymmetric anatomy (heart left-sided)
  random_rotation_degrees: 10
  random_brightness: 0.1
  random_contrast: 0.1
  histogram_equalization: true

training:
  epochs: 30
  optimizer: "adam"
  learning_rate: 0.0001
  weight_decay: 0.00001
  lr_scheduler: "cosine"
  class_weights: "balanced"  # Handle Normal/Pneumonia imbalance
  early_stopping_patience: 7

evaluation:
  metrics:
    - accuracy
    - sensitivity
    - specificity
    - auc
    - f1
    - mcc
  calibration:
    compute_ece: true
    num_bins: 15
  interpretability:
    gradcam_layer: "layer4"
    save_heatmaps: true

paths:
  output_dir: "outputs/resnet50/"
  checkpoint_name: "best_model.pt"
  log_file: "training.log"
